name: Commitlint

on:
  pull_request:
  merge_group:

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx commitlint --config .config/commitlint.config.cjs --from "${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || 'HEAD~1' }}" --to "${{ github.event.pull_request.head.sha || github.sha }}"
