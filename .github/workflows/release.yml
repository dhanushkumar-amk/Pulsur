name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_name: "@pulsur/http-server-linux-x64"
            package_dir: packages/@pulsur/http-server-linux-x64
            asset_name: pulsur-http-server-linux-x64
          - label: darwin-x64
            os: macos-13
            target: x86_64-apple-darwin
            package_name: "@pulsur/http-server-darwin-x64"
            package_dir: packages/@pulsur/http-server-darwin-x64
            asset_name: pulsur-http-server-darwin-x64
          - label: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            package_name: "@pulsur/http-server-darwin-arm64"
            package_dir: packages/@pulsur/http-server-darwin-arm64
            asset_name: pulsur-http-server-darwin-arm64
          - label: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            package_name: "@pulsur/http-server-win32-x64"
            package_dir: packages/@pulsur/http-server-win32-x64
            asset_name: pulsur-http-server-win32-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Install npm dependencies
        run: npm ci
      - name: Build HTTP server
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ] && [ "${{ matrix.target }}" != "x86_64-unknown-linux-gnu" ]; then
            cross build --release --target "${{ matrix.target }}" -p http_server
          else
            cargo build --release --target "${{ matrix.target }}" -p http_server
          fi
      - name: Strip debug symbols
        if: runner.os != 'Windows'
        shell: bash
        run: |
          strip "target/${{ matrix.target }}/release/http_server"
      - name: Stage npm binary package
        run: node ./scripts/stage-npm-binary.js --component http-server --platform ${{ matrix.label }} --profile release
      - name: Pack platform npm package
        run: npm pack ./${{ matrix.package_dir }}
      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.label }}
          path: ${{ matrix.package_dir }}/*.tgz
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/http_server*
            ${{ matrix.package_dir }}/*.tgz

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs:
      - build-binaries
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          path: ./dist/npm
      - run: npm ci
      - run: npm publish ./packages/@pulsur/http-server --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish platform packages
        shell: bash
        run: |
          find ./dist/npm -name '*.tgz' -print0 | while IFS= read -r -d '' archive; do
            npm publish "$archive" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
