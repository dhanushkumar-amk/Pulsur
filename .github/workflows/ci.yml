name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --features http_server/noop -- -D warnings
        
      - name: Run tests
        run: cargo test --workspace --all-targets --features http_server/noop
        
      - name: Run rustfmt check
        run: cargo fmt --all -- --check
